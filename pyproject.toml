[project]
name = "nebula-sdk"
version = "1.7.0-rc.0"
description = "Nebula Python SDK (autogenerated)"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "Nebula", email = "support@zeroset.com" }]
keywords = ["nebula", "memory", "ai", "sdk", "openapi"]
classifiers = [
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Typing :: Typed",
]
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.7",
]

[project.urls]
Homepage = "https://github.com/zeroset-inc/nebula-python"
Repository = "https://github.com/zeroset-inc/nebula-python"
Issues = "https://github.com/zeroset-inc/nebula-python/issues"

[project.optional-dependencies]
test = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "respx>=0.21",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/nebula"]
include = ["src/nebula/py.typed"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
