[project]
name = "nebula-sdk"
version = "0.0.0+from-source"
description = "Nebula Python SDK (autogenerated)"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.7",
]

[project.optional-dependencies]
test = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "respx>=0.21",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/nebula"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
