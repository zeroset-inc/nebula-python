# Replaces the Stainless-generated `./scripts/{lint,test}`-based CI for the
# downstream nebula-agi/nebula-python repo. Synced into place by the upstream
# nebula-sdk-sync.yml workflow. Edit the template at
# nebula-sdks/custom/downstream-py/.github/workflows/ci.yml — direct edits in
# the downstream repo will be overwritten on the next sync.

name: CI

on:
  push:
    branches:
      - main
      - "auto/**"
      - "nebula-internal/**"
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test + lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python (reads .python-version)
        run: uv python install

      - name: Install SDK with test extras into a venv
        # `uv pip install --system` fails on Ubuntu 24.04's externally-
        # managed Python; using a venv is the cross-platform path.
        run: |
          uv venv
          uv pip install -e ".[test]"

      - name: Test
        run: .venv/bin/python -m pytest tests/ -q
