# Single source of truth for cutting and publishing releases.
#
# release-please-action reads Conventional Commits on main and opens a
# release PR that bumps pyproject.toml + CHANGELOG.md + the manifest.
# Merging that release PR sets `release_created = true`, and the publish
# job runs in the SAME workflow.
#
# Why publish lives here instead of a separate `on: release: published`
# workflow: release-please-action uses the default GITHUB_TOKEN, and
# GitHub's recursion guard prevents events created by GITHUB_TOKEN from
# triggering downstream workflows. A separate release-triggered workflow
# would never fire under that token. Folding publish into this workflow
# avoids the PAT/App-token rotation cost AND the foot-gun.
#
# Manual re-publish recovery still works via the standalone publish-pypi.yml
# (workflow_dispatch only).
#
# Synced from nebula-sdks/custom/downstream-py/.github/workflows/release-please.yml
# by the upstream nebula-sdk-sync.yml workflow. Edit the template, not the
# downstream copy.

name: release-please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write # PyPI Trusted Publisher
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: uv build

      - name: Publish to PyPI (Trusted Publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
