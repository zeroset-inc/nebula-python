# Publish nebula-sdk to PyPI. Triggered by `release: published` (created
# by the nebula-sdk-bot GitHub App in release-please.yml), or manually via
# workflow_dispatch for re-publish recovery.
#
# Channel routing (PyPI):
#   - Plain semver (1.6.0)                 → pip installs by default
#   - PEP 440 pre-release (1.6.0rc1, etc.) → only installed with `--pre`
#
# PyPI has no dist-tag analogue to npm's `next`; pip's default resolver
# already excludes pre-releases unless explicitly opted into. Consumers
# running `pip install nebula-sdk` get stable; `pip install --pre
# nebula-sdk` gets the iteration channel. Version pinning to
# `nebula-sdk>=1.6.0,<2.0.0` likewise excludes 1.6.0rc1 unless the
# specifier itself names a pre-release.
#
# Two-job structure:
#   preflight  → no environment, fast sentinel guard on the checked-out
#                version. Runs immediately on every dispatch/trigger.
#   publish    → needs preflight, gated on `environment: release`
#                (reviewer approval). Only requests approval AFTER the
#                preflight has confirmed there's something real to publish.
#
# Why split: a workflow_dispatch from main (with the in-repo sentinel
# `0.0.0+from-source` in pyproject.toml) would otherwise sit in the
# approval queue, get approved by a human, then fail fast inside the
# gated job. The split moves the sentinel check ahead of approval so
# bad dispatches fail in seconds without burning reviewer attention.
#
# Authentication is PyPI Trusted Publisher (OIDC) — no PYPI_TOKEN secret.
# The trusted publisher must be configured at
# https://pypi.org/manage/project/nebula-sdk/settings/publishing/ with:
#   - Owner: zeroset-inc
#   - Repository: nebula-python
#   - Workflow filename: publish-pypi.yml
#   - Environment: release
#
# PEP 740 attestations: `attestations: true` makes the publish action
# sign the artifacts with a Sigstore bundle that PyPI surfaces to clients
# (pip's `--require-hashes` + future provenance checking can verify).
#
# Synced from nebula-sdks/custom/downstream-py/.github/workflows/publish-pypi.yml
# by the upstream nebula-sdk-sync.yml workflow. Edit the template, not the
# downstream copy.

name: Publish PyPI

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  preflight:
    name: preflight
    runs-on: ubuntu-latest
    # Deliberately no `environment:` — we want the sentinel check to
    # run before any approval is requested.
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Sentinel guard
        id: v
        run: |
          # In-repo main carries `0.0.0+from-source` until release-please
          # bumps it. The `release:published` trigger checks out the tag
          # (real version, safe); `workflow_dispatch` defaults to the
          # dispatched ref — if someone dispatches from main without
          # picking a tag, PyPI would reject (local-version identifier
          # `+from-source` is not allowed on upload). Bail.
          version=$(grep -E '^version\s*=' pyproject.toml | head -1 | sed -E 's/.*"(.*)"/\1/')
          if [[ "$version" == *from-source* ]]; then
            echo "::error::Refusing to publish sentinel version '$version'. Dispatch this workflow against a release tag (e.g. v1.6.0rc0), not main."
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Publishing $version"

  publish:
    name: publish
    needs: preflight
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write # OIDC trusted publishing + Sigstore attestation
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: uv build

      - name: Publish to PyPI (Trusted Publisher + attestations)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true
