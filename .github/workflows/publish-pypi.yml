# Manual re-publish recovery for nebula-sdk on PyPI.
#
# The PRIMARY publish path lives in release-please.yml — it runs the
# publish job conditional on `release_created == 'true'` in the same
# workflow as the release-PR merge. That avoids the GITHUB_TOKEN
# recursion guard (a `release: published` trigger would never fire when
# release-please-action creates the release via the default token).
#
# This workflow exists only for the rare case where the automatic
# publish failed mid-run (PyPI hiccup, transient build failure) and an
# operator needs to re-publish the same tag. Trigger it from the
# Actions UI with workflow_dispatch.
#
# Uses PyPI Trusted Publisher (OIDC) — no API token in repo secrets.
# The Trusted Publisher config must list BOTH release-please.yml and
# publish-pypi.yml as authorized workflows.
#
# Synced from nebula-sdks/custom/downstream-py/.github/workflows/publish-pypi.yml
# by the upstream nebula-sdk-sync.yml workflow. Edit the template, not the
# downstream copy.

name: Publish PyPI (manual recovery)

on:
  workflow_dispatch:

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: uv build

      - name: Publish to PyPI (Trusted Publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
