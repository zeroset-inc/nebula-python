# Publish nebula-sdk to PyPI. Triggered by release-please on tag, or
# manually for re-publish recovery.
#
# Uses PyPI Trusted Publisher (OIDC) — no API token in repo secrets.
# Configure the trusted publisher in PyPI project settings:
#   - Owner: nebula-agi
#   - Repository: nebula-python
#   - Workflow: publish-pypi.yml
#   - Environment: release
#
# Synced from nebula-sdks/custom/downstream-py/.github/workflows/publish-pypi.yml
# by the upstream nebula-sdk-sync.yml workflow. Edit the template, not the
# downstream copy.

name: Publish PyPI

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: uv build

      - name: Publish to PyPI (Trusted Publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
