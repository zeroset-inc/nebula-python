# Publish nebula-sdk to PyPI. Triggered by `release: published` (created
# by the nebula-sdk-bot GitHub App in release-please.yml), or manually via
# workflow_dispatch for re-publish recovery.
#
# Authentication is PyPI Trusted Publisher (OIDC) — no PYPI_TOKEN secret.
# The trusted publisher must be configured at
# https://pypi.org/manage/project/nebula-sdk/settings/publishing/ with:
#   - Owner: nebula-agi
#   - Repository: nebula-python
#   - Workflow filename: publish-pypi.yml
#   - Environment: release
#
# PEP 740 attestations: `attestations: true` makes the publish action
# sign the artifacts with a Sigstore bundle that PyPI surfaces to clients
# (pip's `--require-hashes` + future provenance checking can verify).
#
# Synced from nebula-sdks/custom/downstream-py/.github/workflows/publish-pypi.yml
# by the upstream nebula-sdk-sync.yml workflow. Edit the template, not the
# downstream copy.

name: Publish PyPI

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write # OIDC trusted publishing + Sigstore attestation
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: uv build

      - name: Publish to PyPI (Trusted Publisher + attestations)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true
